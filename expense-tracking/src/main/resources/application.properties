spring.application.name=expense-tracking

# Database — all values injected via environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration — injected via environment variable
blaze.app.jwtSecret=${JWT_SECRET}
blaze.app.jwtExpirationMs=${JWT_EXPIRATION_MS}
server.port=8081